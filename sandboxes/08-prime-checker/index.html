<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prime checker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>&#128290;</text></svg>" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app">
      <header class="masthead">
        <h1>Prime checker</h1>
        <p class="subtitle">Enter a whole number to see if it is prime.</p>
      </header>

      <form id="form" class="checker" novalidate>
        <label class="field" for="number">
          <span class="field-label">Number</span>
          <input
            id="number"
            name="number"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            placeholder="e.g. 97"
            aria-describedby="result"
          />
        </label>
        <button type="submit" class="btn-primary">Check</button>
      </form>

      <p id="result" class="result" role="status" aria-live="polite"></p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
