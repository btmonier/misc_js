<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello DOM</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app">
      <h1>Hello, DOM</h1>
      <p>Click the button; watch the counter.</p>
      <section class="counter">
        <button type="button" id="dec" aria-label="decrement">&minus;</button>
        <output id="value">0</output>
        <button type="button" id="inc" aria-label="increment">+</button>
      </section>
      <p class="hint">Last tick: <span id="tick">&mdash;</span></p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
